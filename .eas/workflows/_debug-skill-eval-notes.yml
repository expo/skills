# THROWAWAY: notes-only slice of skill-eval-ci.yml, manually triggered, to
# re-verify job mechanics after removing provision_mcp_token (simplified Expo
# MCP auth to a plain EXPO_TOKEN passthrough -- see eval-experiments#15).
# Delete once this re-verification is done; do not merge into skill-eval-ci.yml.
name: _debug-skill-eval-notes

jobs:
  author_app_notes:
    name: author (notes)
    runs_on: linux-medium
    environment: production
    env:
      AGENT: claude-code
      PRD: dataset/prds/notes/prd/mvp.txt
      SCENARIO: skills_available_unmentioned
    steps:
      - uses: eas/checkout

      - name: fetch eval-harness
        run: |
          git config --global url."https://x-access-token:${EVAL_HARNESS_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init eval-harness

      - name: author app (Claude Code, this PR's own skill checkout)
        run: |
          export SKILL_PLUGIN_DIR="$(pwd)/plugins/expo"
          bash ./eval-harness/eval_harness/app_builder/scripts/author-app.sh

      - name: Package authored app
        if: ${{ always() }}
        run: |
          tar \
            --exclude 'eval-harness/agent-workspace/*/node_modules' \
            --exclude 'eval-harness/agent-workspace/*/.expo' \
            --exclude 'eval-harness/agent-workspace/*/.mcp.json' \
            -czf authored-app-notes.tar.gz -C eval-harness agent-workspace eval-out

      - name: Upload authored app
        if: ${{ always() }}
        uses: eas/upload_artifact
        with:
          type: other
          name: authored-app-notes
          path: authored-app-notes.tar.gz

  eval_skill_notes:
    name: skill eval (notes)
    needs: [author_app_notes]
    runs_on: linux-medium
    environment: production
    outputs:
      report: ${{ steps.run.outputs.report }}
    steps:
      - uses: eas/checkout

      - name: fetch eval-harness
        run: |
          git config --global url."https://x-access-token:${EVAL_HARNESS_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init eval-harness

      - name: Download authored app
        uses: eas/download_artifact
        id: download_author
        with:
          name: authored-app-notes

      - name: Analyze authored app for skill eval
        id: run
        run: |
          AUTHORED_ARTIFACT='${{ steps.download_author.outputs.artifact_path }}' \
          SCENARIO='skills_available_unmentioned' \
          OUT_DIR=skill-eval-report-notes \
          PRD_SKILLS="$(pwd)/eval-harness/dataset/prd_skills.json" \
          CASE_DIR="$(pwd)/eval-harness/eval_harness/evaluator/skill_invocation/skill_cases" \
          bash ./eval-harness/eval_harness/evaluator/skill_invocation/scripts/eval-skill-use.sh
          summary=$(python3 -c "import json; d=json.load(open('skill-eval-report-notes/metrics.json')); r=(d.get('runs') or [{}])[0]; print('expected=' + str(r.get('skill_id')) + ' detected=' + (','.join(r.get('detected_skills') or []) or 'none') + ' recall=' + str(r.get('trigger_recall')) + ' precision=' + str(r.get('trigger_precision')))" 2>/dev/null || echo "no summary")
          set-output report "${summary:-no report}"

      - name: Package skill-eval report
        if: ${{ always() }}
        run: tar -czf skill-eval-report-notes.tar.gz skill-eval-report-notes

      - name: Upload skill-eval report
        if: ${{ always() }}
        uses: eas/upload_artifact
        with:
          type: other
          name: skill-eval-report-notes
          path: skill-eval-report-notes.tar.gz
