name: skill eval

# Non-interactive eval of the Expo skills on every PR that touches a skill.
# A `detect` job maps the PR's changed skills to a tier:
#   - UI/app-building skill changed -> runtime tier: build the hot_chocolate app
#     with the whole plugin loaded and screenshot every route on iOS + Android.
#   - any other skill changed        -> static tier: build a small example and
#     run tsc + lint + expo export (no device).
# Results are posted as a PR comment. This is ADVISORY — it never blocks merge.
#
# Prerequisites (one-time, outside this file):
#   - Connect this GitHub repo to the EAS project (GitHub App) so pull_request
#     triggers and github-comment work.
#   - Add ANTHROPIC_API_KEY as a (sensitive) EAS environment variable in the
#     `production` environment — the `claude -p` executor reads it from env.
#
# Confirmed on a real run: `set-output NAME VALUE` (rejects empty VALUE; multi-line
# markdown values work), python3 is present, and the tier gating fires correctly.
# The EAS worker ships Node 18, so the eval jobs bump to Node 22 via nvm (claude-code
# needs >=22; recent create-expo-app wants >=20) — see the eval steps below.

on:
  pull_request:
    branches:
      - main
    paths:
      - plugins/expo/skills/**

jobs:
  # --- Decide the tier from the changed skills ------------------------------
  detect:
    name: detect eval tier
    runs_on: linux-medium
    env:
      # TEMPORARY (testing): force a tier regardless of changed files. Remove
      # this block to restore git-diff-based tier detection.
      EVAL_FORCE_TIER: runtime
    outputs:
      tier: ${{ steps.detect.outputs.tier }}
      skills: ${{ steps.detect.outputs.skills }}
    steps:
      - uses: eas/checkout
      - name: detect
        id: detect
        run: |
          # eval-ci.py fetches the base best-effort and prints `tier=...` /
          # `skills=...` on stdout (diagnostics go to stderr).
          out=$(python3 scripts/eval-ci.py detect --base origin/main)
          echo "$out"
          tier=$(echo "$out" | sed -n 's/^tier=//p')
          skills=$(echo "$out" | sed -n 's/^skills=//p')
          # EAS `set-output NAME VALUE` rejects an empty VALUE, so default to a
          # placeholder. `skills` is only consumed when tier==static (where it is
          # always non-empty), so the `none` placeholder is never read as a skill.
          set-output tier "${tier:-none}"
          set-output skills "${skills:-none}"

  # --- Static tier: one linux job -------------------------------------------
  static_eval:
    name: static eval
    needs: [detect]
    if: ${{ needs.detect.outputs.tier == 'static' }}
    runs_on: linux-medium
    environment: production
    outputs:
      report: ${{ steps.run.outputs.report }}
      result: ${{ steps.run.outputs.result }}
    steps:
      - uses: eas/checkout
      - name: run static eval
        id: run
        run: |
          echo "=== worker env: node $(node -v 2>&1) | python3 $(python3 --version 2>&1) | bun $(command -v bun || echo none) ==="
          export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
          if [ -s "$NVM_DIR/nvm.sh" ]; then . "$NVM_DIR/nvm.sh"; nvm install 22 && nvm use 22; else echo "nvm not found (node stays $(node -v))"; ls -d "$HOME/.nvm/versions/node"/* 2>/dev/null || true; fi
          echo "node in use: $(node -v)"
          npm i -g bun @anthropic-ai/claude-code
          rc=0
          python3 scripts/eval-ci.py run --tier static --skills "${{ needs.detect.outputs.skills }}" --out "$PWD/.eval-out" || rc=$?
          report=$(cat .eval-out/eval-report.md 2>/dev/null || echo "no report")
          result=$(python3 -c "import json;print('success' if json.load(open('.eval-out/eval-summary.json'))['passed'] else 'failure')" 2>/dev/null || echo failure)
          set-output report "${report:-no report}"
          set-output result "${result:-failure}"
          # eval-ci exits 2 only on infra errors (executor/fixture) → red check;
          # genuine skill-quality failures exit 0 (advisory, comment only).
          exit $rc
      - name: upload artifacts
        uses: eas/upload_artifact
        if: ${{ always() }}
        with:
          type: other
          name: eval-static
          ignore_error: true
          # Single pre-tarred bundle with clean paths relative to .eval-out
          # (eas archives absolute paths, so we can't upload loose files cleanly).
          path: .eval-out/eval-results.tar.gz

  # --- Runtime tier: iOS (build + screenshot on the same macOS worker) ------
  runtime_ios:
    name: runtime eval (iOS)
    needs: [detect]
    if: ${{ needs.detect.outputs.tier == 'runtime' }}
    runs_on: macos-medium          # "Runs iOS jobs, including simulators"
    environment: production
    outputs:
      report: ${{ steps.run.outputs.report }}
      result: ${{ steps.run.outputs.result }}
    steps:
      - uses: eas/checkout
      - name: build + screenshot iOS
        id: run
        run: |
          echo "=== worker env: node $(node -v 2>&1) | python3 $(python3 --version 2>&1) | bun $(command -v bun || echo none) ==="
          export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
          if [ -s "$NVM_DIR/nvm.sh" ]; then . "$NVM_DIR/nvm.sh"; nvm install 22 && nvm use 22; else echo "nvm not found (node stays $(node -v))"; ls -d "$HOME/.nvm/versions/node"/* 2>/dev/null || true; fi
          echo "node in use: $(node -v)"
          npm i -g bun @anthropic-ai/claude-code
          rc=0
          python3 scripts/eval-ci.py run --tier runtime --platform ios --prd .claude/skills/expo-plugin-eval/references/hot-chocolate-prd.txt --out "$PWD/.eval-out" || rc=$?
          report=$(cat .eval-out/eval-report.md 2>/dev/null || echo "no report")
          result=$(python3 -c "import json;print('success' if json.load(open('.eval-out/eval-summary.json'))['passed'] else 'failure')" 2>/dev/null || echo failure)
          set-output report "${report:-no report}"
          set-output result "${result:-failure}"
          # eval-ci exits 2 only on infra errors (executor/fixture) → red check;
          # genuine skill-quality failures exit 0 (advisory, comment only).
          exit $rc
      - name: upload artifacts
        uses: eas/upload_artifact
        if: ${{ always() }}
        with:
          type: other
          name: eval-ios
          ignore_error: true
          # Single pre-tarred bundle with clean paths relative to .eval-out
          # (eas archives absolute paths, so we can't upload loose files cleanly).
          path: .eval-out/eval-results.tar.gz

  # --- Runtime tier: Android (build + screenshot on the same linux worker) --
  runtime_android:
    name: runtime eval (Android)
    needs: [detect]
    if: ${{ needs.detect.outputs.tier == 'runtime' }}
    runs_on: linux-large-nested-virtualization   # required for Android emulators
    environment: production
    outputs:
      report: ${{ steps.run.outputs.report }}
      result: ${{ steps.run.outputs.result }}
    steps:
      - uses: eas/checkout
      - name: build + screenshot Android
        id: run
        run: |
          echo "=== worker env: node $(node -v 2>&1) | python3 $(python3 --version 2>&1) | bun $(command -v bun || echo none) ==="
          export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
          if [ -s "$NVM_DIR/nvm.sh" ]; then . "$NVM_DIR/nvm.sh"; nvm install 22 && nvm use 22; else echo "nvm not found (node stays $(node -v))"; ls -d "$HOME/.nvm/versions/node"/* 2>/dev/null || true; fi
          echo "node in use: $(node -v)"
          npm i -g bun @anthropic-ai/claude-code
          rc=0
          python3 scripts/eval-ci.py run --tier runtime --platform android --prd .claude/skills/expo-plugin-eval/references/hot-chocolate-prd.txt --out "$PWD/.eval-out" || rc=$?
          report=$(cat .eval-out/eval-report.md 2>/dev/null || echo "no report")
          result=$(python3 -c "import json;print('success' if json.load(open('.eval-out/eval-summary.json'))['passed'] else 'failure')" 2>/dev/null || echo failure)
          set-output report "${report:-no report}"
          set-output result "${result:-failure}"
          # eval-ci exits 2 only on infra errors (executor/fixture) → red check;
          # genuine skill-quality failures exit 0 (advisory, comment only).
          exit $rc
      - name: upload artifacts
        uses: eas/upload_artifact
        if: ${{ always() }}
        with:
          type: other
          name: eval-android
          ignore_error: true
          # Single pre-tarred bundle with clean paths relative to .eval-out
          # (eas archives absolute paths, so we can't upload loose files cleanly).
          path: .eval-out/eval-results.tar.gz

  # --- PR comments (one per tier so no empty sections render) ---------------
  # eval-ci.py always exits 0 (soft gate) — pass/fail is encoded in the report,
  # not the exit code — so `needs` never blocks these comment jobs on a red eval.
  comment_static:
    name: comment (static)
    # after: (not needs:) runs regardless of static_eval's pass/fail — needs:
    # skips the comment when the eval job fails. after.<job>.outputs is available.
    after: [detect, static_eval]
    if: ${{ after.detect.outputs.tier == 'static' }}
    type: github-comment
    params:
      payload: |
        <!-- expo-eval -->
        ${{ after.static_eval.outputs.report }}

        📎 Generated app + logs: [workflow artifacts](${{ workflow.url }})

  comment_runtime:
    name: comment (runtime)
    # after: (not needs:) runs regardless of the runtime jobs' pass/fail — needs:
    # skips the comment when an eval job fails. after.<job>.outputs is available.
    after: [detect, runtime_ios, runtime_android]
    if: ${{ after.detect.outputs.tier == 'runtime' }}
    type: github-comment
    params:
      payload: |
        <!-- expo-eval -->
        ## Expo plugin eval — runtime

        ### iOS
        ${{ after.runtime_ios.outputs.report }}

        ### Android
        ${{ after.runtime_android.outputs.report }}

        📎 Screenshots (`viewer.html`), generated app & logs: [workflow artifacts](${{ workflow.url }})
