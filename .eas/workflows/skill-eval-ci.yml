  se_wiki_reader_main:
    name: wiki_reader main
    runs_on: linux-medium
    environment: production
    env:
      AGENT: claude-code
      PRD: dataset/prds/wiki_reader/prd/mvp.txt
      PRD_ID: wiki_reader
      SCENARIO: skills_available_unmentioned
    outputs:
      report: ${{ steps.run.outputs.report }}
      expected: ${{ steps.run.outputs.expected }}
      detected: ${{ steps.run.outputs.detected }}
      recall: ${{ steps.run.outputs.recall }}
      precision: ${{ steps.run.outputs.precision }}
      lexical: ${{ steps.run.outputs.lexical }}
      structural: ${{ steps.run.outputs.structural }}
      syntax_ok: ${{ steps.run.outputs.syntax_ok }}
      bundle_ok: ${{ steps.run.outputs.bundle_ok }}
    steps:
      - uses: eas/checkout

      - name: fingerprint
        id: fingerprint
        run: |
          bash scripts/ci.sh fingerprint_main_content extract > fp-wiki_reader-main.json
          set-output fingerprint "$(python3 -c "import json; print(json.load(open('fp-wiki_reader-main.json'))['fingerprint'])")"

      - name: restore cache
        uses: eas/restore_cache
        with:
          key: skill-eval-baseline-v1-${{ steps.fingerprint.outputs.fingerprint }}
          path: cached-baseline-wiki_reader-main

      - name: check cache
        id: check_cache
        run: set-output cache_hit "$(bash scripts/ci.sh check_cache_hit cached-baseline-wiki_reader-main "${{ steps.fingerprint.outputs.fingerprint }}")"

      - name: author and evaluate
        id: run
        run: |
          eval "$(bash scripts/ci.sh author_and_evaluate "${{ steps.check_cache.outputs.cache_hit }}" cached-baseline-wiki_reader-main /tmp/plugins-main/plugins/expo skill-eval-report-wiki_reader-main "${SCENARIO}" skill-eval-report-wiki_reader-main.tar.gz)"
          set-output report "$report"
          set-output expected "$expected"
          set-output detected "$detected"
          set-output recall "$recall"
          set-output precision "$precision"
          set-output lexical "$lexical"
          set-output structural "$structural"
          set-output syntax_ok "$syntax_ok"
          set-output bundle_ok "$bundle_ok"

