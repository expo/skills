      - name: Upload skill-eval report
        if: ${{ always() }}
        uses: eas/upload_artifact
        with:
          type: other
          name: skill-eval-report-wiki_reader-pr
          path: skill-eval-report-wiki_reader-pr.tar.gz

  # One combined comment covering all 3 PRDs, main vs. PR side by side.
  # `after:` (not `needs:`) so this still posts even if some jobs failed --
  # advisory only, should never look like the PR is silently missing
  # feedback. "Expected skills" is pulled from the `pr` variant's output for
  # each PRD (both variants score against the same ground truth, so either
  # would do).
  comment:
    name: comment
    after:
      [
        eval_skill_notes_main,
        eval_skill_notes_pr,
        eval_skill_hot_chocolate_main,
        eval_skill_hot_chocolate_pr,
        eval_skill_wiki_reader_main,
        eval_skill_wiki_reader_pr,
      ]
    type: github-comment
    params:
      payload: |
        <!-- expo-skill-eval -->
        ## Expo skill eval

        Each app is authored twice: once against **main**'s current skill content, once against **this PR**'s. Same ground truth, so you can see whether this PR improves or regresses skill-trigger recall/precision -- and whether the authored code's quality changes too.

        ### Trigger detection

        | App | Expected skills | main: detected (recall / precision) | This PR: detected (recall / precision) |
        |---|---|---|---|
        | notes | ${{ after.eval_skill_notes_pr.outputs.expected }} | ${{ after.eval_skill_notes_main.outputs.detected }} (${{ after.eval_skill_notes_main.outputs.recall }} / ${{ after.eval_skill_notes_main.outputs.precision }}) | ${{ after.eval_skill_notes_pr.outputs.detected }} (${{ after.eval_skill_notes_pr.outputs.recall }} / ${{ after.eval_skill_notes_pr.outputs.precision }}) |
        | hot_chocolate | ${{ after.eval_skill_hot_chocolate_pr.outputs.expected }} | ${{ after.eval_skill_hot_chocolate_main.outputs.detected }} (${{ after.eval_skill_hot_chocolate_main.outputs.recall }} / ${{ after.eval_skill_hot_chocolate_main.outputs.precision }}) | ${{ after.eval_skill_hot_chocolate_pr.outputs.detected }} (${{ after.eval_skill_hot_chocolate_pr.outputs.recall }} / ${{ after.eval_skill_hot_chocolate_pr.outputs.precision }}) |
        | wiki_reader | ${{ after.eval_skill_wiki_reader_pr.outputs.expected }} | ${{ after.eval_skill_wiki_reader_main.outputs.detected }} (${{ after.eval_skill_wiki_reader_main.outputs.recall }} / ${{ after.eval_skill_wiki_reader_main.outputs.precision }}) | ${{ after.eval_skill_wiki_reader_pr.outputs.detected }} (${{ after.eval_skill_wiki_reader_pr.outputs.recall }} / ${{ after.eval_skill_wiki_reader_pr.outputs.precision }}) |

        ### Code quality (lexical / structural checks, syntax, bundle)

        Lexical/structural are shown as passed/total uptake checks. Syntax and bundle are ✅ pass / ❌ fail / ❔ couldn't tell / ➖ not run.

        | App | Side | Lexical | Structural | Syntax | Bundle |
        |---|---|---|---|---|---|
        | notes | main | ${{ after.eval_skill_notes_main.outputs.lexical }} | ${{ after.eval_skill_notes_main.outputs.structural }} | ${{ after.eval_skill_notes_main.outputs.syntax_ok }} | ${{ after.eval_skill_notes_main.outputs.bundle_ok }} |
