        run: set-output cache_hit "$(bash scripts/ci.sh check_cache_hit cached-baseline-hot_chocolate-main "${{ steps.fingerprint.outputs.fingerprint }}")"

      - name: author and evaluate
        id: run
        run: |
          eval "$(bash scripts/ci.sh author_and_evaluate "${{ steps.check_cache.outputs.cache_hit }}" cached-baseline-hot_chocolate-main /tmp/plugins-main/plugins/expo skill-eval-report-hot_chocolate-main "${SCENARIO}" skill-eval-report-hot_chocolate-main.tar.gz)"
          set-output report "$report"
          set-output expected "$expected"
          set-output detected "$detected"
          set-output recall "$recall"
          set-output precision "$precision"
          set-output lexical "$lexical"
          set-output structural "$structural"
          set-output syntax_ok "$syntax_ok"
          set-output bundle_ok "$bundle_ok"

      - name: upload report
        if: ${{ always() }}
        uses: eas/upload_artifact
        with:
          type: other
          name: skill-eval-report-hot_chocolate-main
          path: skill-eval-report-hot_chocolate-main.tar.gz

  se_hot_chocolate_pr:
    name: hot_chocolate pr
    runs_on: linux-medium
    environment: production
    env:
      AGENT: claude-code
      PRD: dataset/prds/hot_chocolate/prd/mvp.txt
      SCENARIO: skills_available_unmentioned
    outputs:
      report: ${{ steps.run.outputs.report }}
      expected: ${{ steps.run.outputs.expected }}
      detected: ${{ steps.run.outputs.detected }}
      recall: ${{ steps.run.outputs.recall }}
      precision: ${{ steps.run.outputs.precision }}
      lexical: ${{ steps.run.outputs.lexical }}
      structural: ${{ steps.run.outputs.structural }}
      syntax_ok: ${{ steps.run.outputs.syntax_ok }}
      bundle_ok: ${{ steps.run.outputs.bundle_ok }}
      failing: ${{ steps.run.outputs.failing }}
    steps:
      - uses: eas/checkout

      - name: author and evaluate
        id: run
        run: |
          eval "$(bash scripts/ci.sh author_and_evaluate false - "$(pwd)/plugins/expo" skill-eval-report-hot_chocolate-pr "${SCENARIO}" skill-eval-report-hot_chocolate-pr.tar.gz)"
          set-output report "$report"
          set-output expected "$expected"
          set-output detected "$detected"
          set-output recall "$recall"
          set-output precision "$precision"
          set-output lexical "$lexical"
          set-output structural "$structural"
          set-output syntax_ok "$syntax_ok"
          set-output bundle_ok "$bundle_ok"
          set-output failing "$failing"

      - name: upload report
        if: ${{ always() }}
