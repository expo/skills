# Skill eval for PRs touching plugins/expo/skills/**. Advisory, never blocks
# merge. Authors+evaluates 3 PRDs vs main and this PR. "_main" jobs cache via
# fingerprint+restore_cache; only skill-eval-main-baseline.yml writes that
# cache. Logic in scripts/*: EAS caps workflow files at 16 KiB.
name: skill-eval-ci

on:
  pull_request:
    branches:
      - main
    paths:
      - plugins/expo/skills/**
  workflow_dispatch: {}

jobs:
  se_notes_main:
    name: notes main
    runs_on: linux-medium
    environment: production
    env:
      AGENT: claude-code
      PRD: dataset/prds/notes/prd/mvp.txt
      PRD_ID: notes
      SCENARIO: skills_available_unmentioned
    outputs:
      report: ${{ steps.run.outputs.report }}
      expected: ${{ steps.run.outputs.expected }}
      detected: ${{ steps.run.outputs.detected }}
      recall: ${{ steps.run.outputs.recall }}
      precision: ${{ steps.run.outputs.precision }}
      lexical: ${{ steps.run.outputs.lexical }}
      structural: ${{ steps.run.outputs.structural }}
      syntax_ok: ${{ steps.run.outputs.syntax_ok }}
      bundle_ok: ${{ steps.run.outputs.bundle_ok }}
    steps:
      - uses: eas/checkout

      - name: fingerprint
        id: fingerprint
        run: |
          bash scripts/ci.sh fingerprint_main_content extract > fp-notes-main.json
          set-output fingerprint "$(python3 -c "import json; print(json.load(open('fp-notes-main.json'))['fingerprint'])")"

      - name: restore cache
        uses: eas/restore_cache
        with:
          key: skill-eval-baseline-v1-${{ steps.fingerprint.outputs.fingerprint }}
          path: cached-baseline-notes-main

      - name: check cache
        id: check_cache
        run: set-output cache_hit "$(bash scripts/ci.sh check_cache_hit cached-baseline-notes-main "${{ steps.fingerprint.outputs.fingerprint }}")"

      - name: author and evaluate
        id: run
        run: |
          eval "$(bash scripts/ci.sh author_and_evaluate "${{ steps.check_cache.outputs.cache_hit }}" cached-baseline-notes-main /tmp/plugins-main/plugins/expo skill-eval-report-notes-main "${SCENARIO}" skill-eval-report-notes-main.tar.gz)"
          set-output report "$report"
          set-output expected "$expected"
          set-output detected "$detected"
          set-output recall "$recall"
          set-output precision "$precision"
          set-output lexical "$lexical"
          set-output structural "$structural"
          set-output syntax_ok "$syntax_ok"
          set-output bundle_ok "$bundle_ok"

      - name: upload report
        if: ${{ always() }}
        uses: eas/upload_artifact
        with:
          type: other
          name: skill-eval-report-notes-main
          path: skill-eval-report-notes-main.tar.gz

  se_notes_pr:
    name: notes pr
    runs_on: linux-medium
    environment: production
    env:
      AGENT: claude-code
      PRD: dataset/prds/notes/prd/mvp.txt
      SCENARIO: skills_available_unmentioned
    outputs:
      report: ${{ steps.run.outputs.report }}
      expected: ${{ steps.run.outputs.expected }}
      detected: ${{ steps.run.outputs.detected }}
      recall: ${{ steps.run.outputs.recall }}
      precision: ${{ steps.run.outputs.precision }}
      lexical: ${{ steps.run.outputs.lexical }}
      structural: ${{ steps.run.outputs.structural }}
      syntax_ok: ${{ steps.run.outputs.syntax_ok }}
      bundle_ok: ${{ steps.run.outputs.bundle_ok }}
      failing: ${{ steps.run.outputs.failing }}
    steps:
      - uses: eas/checkout

      - name: author and evaluate
        id: run
        run: |
          eval "$(bash scripts/ci.sh author_and_evaluate false - "$(pwd)/plugins/expo" skill-eval-report-notes-pr "${SCENARIO}" skill-eval-report-notes-pr.tar.gz)"
          set-output report "$report"
          set-output expected "$expected"
          set-output detected "$detected"
          set-output recall "$recall"
          set-output precision "$precision"
          set-output lexical "$lexical"
          set-output structural "$structural"
          set-output syntax_ok "$syntax_ok"
          set-output bundle_ok "$bundle_ok"
          set-output failing "$failing"

      - name: upload report
        if: ${{ always() }}
        uses: eas/upload_artifact
        with:
          type: other
          name: skill-eval-report-notes-pr
          path: skill-eval-report-notes-pr.tar.gz

