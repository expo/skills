# Non-interactive skill eval for PRs that touch plugins/expo/skills/**.
# Advisory only -- results post as a PR comment, this never blocks merge.
#
# Runs the eval-experiments harness (github.com/expo/eval-experiments, private,
# vendored here as a git submodule at ./eval-harness pinned to a specific
# commit -- see .gitmodules) against all 3 reference PRDs (notes,
# hot_chocolate, wiki_reader). For each PRD, authoring runs TWICE:
#   - "main": Claude Code loads the skill plugin content as it exists on
#     origin/main (extracted via `git archive`, no second checkout/submodule
#     fetch needed -- the job's own eas/checkout already carries full git
#     history + an origin remote).
#   - "pr": Claude Code loads the skill plugin straight from THIS PR's own
#     checked-out plugins/expo/ directory (via SKILL_PLUGIN_DIR / --plugin-dir),
#     not the published marketplace version -- so this actually tests the PR's
#     proposed changes. This is the original/only mode before this comparison
#     was added.
# The final comment shows both side by side, so a reviewer can tell whether
# the PR's change to a skill improved or regressed trigger recall/precision
# vs. what's on main today -- not just an after-snapshot. It also shows the
# authored code's own quality: lexical/structural uptake-check pass rates
# (dataset/skill_invocation/uptake_checks) and build-health signals (syntax
# parse + real `expo export` bundle, see skill_invocation/build_health) --
# app-wide, not skill-specific. The bundle signal is only as fresh as
# eval-harness's own author-app.sh (needs the STAGE D bundle-check commit);
# an old submodule pin will just show "not run" (➖) for it, not an error.
#
# Known cost tradeoff: this doubles Claude Code authoring runs (6 instead of
# 3 per CI run) to get a genuine before/after comparison instead of an
# after-only snapshot.
#
# No tier/routing yet (every triggered PR runs all 3 PRDs unconditionally),
# and only the skill-eval side runs for now -- no native iOS build/evaluator.
# Both are natural follow-ups once this plumbing is proven out.
#
# Prerequisites (one-time, outside this file):
#   - Connect this GitHub repo to the EAS project via the Expo GitHub App
#     (project Settings > GitHub) so pull_request triggers and github-comment
#     work.
#   - EVAL_HARNESS_ACCESS_TOKEN: a GitHub fine-grained PAT, read-only on
#     eval-experiments (private repo), used to fetch the eval-harness
#     submodule on each job's fresh checkout. NOTE: this PAT is scoped to
#     eval-experiments only, not this (expo/skills) repo -- the "extract
#     main's skill content" step below intentionally runs BEFORE the
#     eval-harness submodule fetch, so the `git fetch origin main` against
#     THIS repo still uses eas/checkout's own working credentials, not the
#     global url.insteadOf rewrite that step installs for github.com.
#   - EXPO_TOKEN: an Expo Robot User access token -- used directly as the Expo
#     MCP server's bearer token (mcp.expo.dev accepts this token as-is, no
#     separate OAuth login needed) and for the coding agent's own `eas build`
#     self-verification step. See eval-harness/.env.default. Optional --
#     authoring still works without it, just without those two capabilities.
#   - ANTHROPIC_API_KEY: already present in this environment.
name: skill-eval-ci

on:
  pull_request:
    branches:
      - main
    paths:
      - plugins/expo/skills/**

jobs:
  # --- Author + skill-eval, once per reference PRD, twice per PRD ----------
  # (once against main's skill content, once against this PR's) -------------

  author_app_notes_main:
    name: author (notes, main)
    runs_on: linux-medium
    environment: production
    env:
      AGENT: claude-code
      PRD: dataset/prds/notes/prd/mvp.txt
      SCENARIO: skills_available_unmentioned
    steps:
      - uses: eas/checkout

      - name: extract main's skill content
        run: |
          git fetch origin main
          mkdir -p /tmp/plugins-main
          git archive origin/main plugins/expo | tar -x -C /tmp/plugins-main

      - name: fetch eval-harness
        run: |
          git config --global url."https://x-access-token:${EVAL_HARNESS_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init eval-harness

      - name: author app (Claude Code, main branch skill checkout)
        run: |
          export SKILL_PLUGIN_DIR="/tmp/plugins-main/plugins/expo"
          bash ./eval-harness/eval_harness/app_builder/scripts/author-app.sh

      - name: Package authored app
        if: ${{ always() }}
        run: |
          tar \
            --exclude 'eval-harness/agent-workspace/*/node_modules' \
            --exclude 'eval-harness/agent-workspace/*/.expo' \
            --exclude 'eval-harness/agent-workspace/*/.mcp.json' \
            -czf authored-app-notes-main.tar.gz -C eval-harness agent-workspace eval-out

      - name: Upload authored app
        if: ${{ always() }}
        uses: eas/upload_artifact
        with:
          type: other
          name: authored-app-notes-main
          path: authored-app-notes-main.tar.gz

  author_app_notes_pr:
    name: author (notes, PR)
    runs_on: linux-medium
    environment: production
    env:
      AGENT: claude-code
      PRD: dataset/prds/notes/prd/mvp.txt
      SCENARIO: skills_available_unmentioned
    steps:
      - uses: eas/checkout

      - name: fetch eval-harness
        run: |
          git config --global url."https://x-access-token:${EVAL_HARNESS_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init eval-harness

      - name: author app (Claude Code, this PR's own skill checkout)
        run: |
          export SKILL_PLUGIN_DIR="$(pwd)/plugins/expo"
          bash ./eval-harness/eval_harness/app_builder/scripts/author-app.sh

      - name: Package authored app
        if: ${{ always() }}
        run: |
          tar \
            --exclude 'eval-harness/agent-workspace/*/node_modules' \
            --exclude 'eval-harness/agent-workspace/*/.expo' \
            --exclude 'eval-harness/agent-workspace/*/.mcp.json' \
            -czf authored-app-notes-pr.tar.gz -C eval-harness agent-workspace eval-out

      - name: Upload authored app
        if: ${{ always() }}
        uses: eas/upload_artifact
        with:
          type: other
          name: authored-app-notes-pr
          path: authored-app-notes-pr.tar.gz

  author_app_hot_chocolate_main:
    name: author (hot_chocolate, main)
    runs_on: linux-medium
    environment: production
    env:
      AGENT: claude-code
      PRD: dataset/prds/hot_chocolate/prd/mvp.txt
      SCENARIO: skills_available_unmentioned
    steps:
      - uses: eas/checkout

      - name: extract main's skill content
        run: |
          git fetch origin main
          mkdir -p /tmp/plugins-main
          git archive origin/main plugins/expo | tar -x -C /tmp/plugins-main

      - name: fetch eval-harness
        run: |
          git config --global url."https://x-access-token:${EVAL_HARNESS_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init eval-harness

      - name: author app (Claude Code, main branch skill checkout)
        run: |
          export SKILL_PLUGIN_DIR="/tmp/plugins-main/plugins/expo"
          bash ./eval-harness/eval_harness/app_builder/scripts/author-app.sh

      - name: Package authored app
        if: ${{ always() }}
        run: |
          tar \
            --exclude 'eval-harness/agent-workspace/*/node_modules' \
            --exclude 'eval-harness/agent-workspace/*/.expo' \
            --exclude 'eval-harness/agent-workspace/*/.mcp.json' \
            -czf authored-app-hot_chocolate-main.tar.gz -C eval-harness agent-workspace eval-out

      - name: Upload authored app
        if: ${{ always() }}
        uses: eas/upload_artifact
        with:
          type: other
          name: authored-app-hot_chocolate-main
          path: authored-app-hot_chocolate-main.tar.gz

  author_app_hot_chocolate_pr:
    name: author (hot_chocolate, PR)
    runs_on: linux-medium
    environment: production
    env:
      AGENT: claude-code
      PRD: dataset/prds/hot_chocolate/prd/mvp.txt
      SCENARIO: skills_available_unmentioned
    steps:
      - uses: eas/checkout

      - name: fetch eval-harness
        run: |
          git config --global url."https://x-access-token:${EVAL_HARNESS_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init eval-harness

      - name: author app (Claude Code, this PR's own skill checkout)
        run: |
          export SKILL_PLUGIN_DIR="$(pwd)/plugins/expo"
          bash ./eval-harness/eval_harness/app_builder/scripts/author-app.sh

      - name: Package authored app
        if: ${{ always() }}
        run: |
          tar \
            --exclude 'eval-harness/agent-workspace/*/node_modules' \
            --exclude 'eval-harness/agent-workspace/*/.expo' \
            --exclude 'eval-harness/agent-workspace/*/.mcp.json' \
            -czf authored-app-hot_chocolate-pr.tar.gz -C eval-harness agent-workspace eval-out

      - name: Upload authored app
        if: ${{ always() }}
        uses: eas/upload_artifact
        with:
          type: other
          name: authored-app-hot_chocolate-pr
          path: authored-app-hot_chocolate-pr.tar.gz

  author_app_wiki_reader_main:
    name: author (wiki_reader, main)
    runs_on: linux-medium
    environment: production
    env:
      AGENT: claude-code
      PRD: dataset/prds/wiki_reader/prd/mvp.txt
      SCENARIO: skills_available_unmentioned
    steps:
      - uses: eas/checkout

      - name: extract main's skill content
        run: |
          git fetch origin main
          mkdir -p /tmp/plugins-main
          git archive origin/main plugins/expo | tar -x -C /tmp/plugins-main

      - name: fetch eval-harness
        run: |
          git config --global url."https://x-access-token:${EVAL_HARNESS_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init eval-harness

      - name: author app (Claude Code, main branch skill checkout)
        run: |
          export SKILL_PLUGIN_DIR="/tmp/plugins-main/plugins/expo"
          bash ./eval-harness/eval_harness/app_builder/scripts/author-app.sh

      - name: Package authored app
        if: ${{ always() }}
        run: |
          tar \
            --exclude 'eval-harness/agent-workspace/*/node_modules' \
            --exclude 'eval-harness/agent-workspace/*/.expo' \
