      - name: author and evaluate
        id: run
        run: |
          eval "$(bash scripts/ci.sh author_and_evaluate false - "$(pwd)/plugins/expo" skill-eval-report-wiki_reader-pr "${SCENARIO}" skill-eval-report-wiki_reader-pr.tar.gz)"
          set-output report "$report"
          set-output expected "$expected"
          set-output detected "$detected"
          set-output recall "$recall"
          set-output precision "$precision"
          set-output lexical "$lexical"
          set-output structural "$structural"
          set-output syntax_ok "$syntax_ok"
          set-output bundle_ok "$bundle_ok"
          set-output failing "$failing"

      - name: upload report
        if: ${{ always() }}
        uses: eas/upload_artifact
        with:
          type: other
          name: skill-eval-report-wiki_reader-pr
          path: skill-eval-report-wiki_reader-pr.tar.gz

  # One combined comment covering all 3 PRDs, main vs. PR side by side.
  # `after:` (not `needs:`) so this still posts even if some jobs failed.
  # "Expected skills" is pulled from the `pr` variant's output for each PRD
  # (both variants score against the same ground truth, so either would do).
  comment:
    name: comment
    after:
      [
        se_notes_main,
        se_notes_pr,
        se_hot_chocolate_main,
        se_hot_chocolate_pr,
        se_wiki_reader_main,
        se_wiki_reader_pr,
      ]
    type: github-comment
    params:
      payload: |
        <!-- expo-skill-eval -->
        ## Expo skill eval

        Authored against **main** and **this PR**, same ground truth.

        ### Triggers

        | App | Expected | main (recall/precision) | PR (recall/precision) |
        |---|---|---|---|
        | notes | ${{ after.se_notes_pr.outputs.expected }} | ${{ after.se_notes_main.outputs.detected }} (${{ after.se_notes_main.outputs.recall }} / ${{ after.se_notes_main.outputs.precision }}) | ${{ after.se_notes_pr.outputs.detected }} (${{ after.se_notes_pr.outputs.recall }} / ${{ after.se_notes_pr.outputs.precision }}) |
        | hot_chocolate | ${{ after.se_hot_chocolate_pr.outputs.expected }} | ${{ after.se_hot_chocolate_main.outputs.detected }} (${{ after.se_hot_chocolate_main.outputs.recall }} / ${{ after.se_hot_chocolate_main.outputs.precision }}) | ${{ after.se_hot_chocolate_pr.outputs.detected }} (${{ after.se_hot_chocolate_pr.outputs.recall }} / ${{ after.se_hot_chocolate_pr.outputs.precision }}) |
        | wiki_reader | ${{ after.se_wiki_reader_pr.outputs.expected }} | ${{ after.se_wiki_reader_main.outputs.detected }} (${{ after.se_wiki_reader_main.outputs.recall }} / ${{ after.se_wiki_reader_main.outputs.precision }}) | ${{ after.se_wiki_reader_pr.outputs.detected }} (${{ after.se_wiki_reader_pr.outputs.recall }} / ${{ after.se_wiki_reader_pr.outputs.precision }}) |

        ### Code quality

        Lexical/structural: passed/total. Syntax/bundle: ✅❌❔➖. Failing: PR only.

        | App | Side | Lexical | Structural | Syntax | Bundle | Failing |
        |---|---|---|---|---|---|---|
        | notes | main | ${{ after.se_notes_main.outputs.lexical }} | ${{ after.se_notes_main.outputs.structural }} | ${{ after.se_notes_main.outputs.syntax_ok }} | ${{ after.se_notes_main.outputs.bundle_ok }} | — |
        | notes | PR | ${{ after.se_notes_pr.outputs.lexical }} | ${{ after.se_notes_pr.outputs.structural }} | ${{ after.se_notes_pr.outputs.syntax_ok }} | ${{ after.se_notes_pr.outputs.bundle_ok }} | ${{ after.se_notes_pr.outputs.failing }} |
        | hot_chocolate | main | ${{ after.se_hot_chocolate_main.outputs.lexical }} | ${{ after.se_hot_chocolate_main.outputs.structural }} | ${{ after.se_hot_chocolate_main.outputs.syntax_ok }} | ${{ after.se_hot_chocolate_main.outputs.bundle_ok }} | — |
        | hot_chocolate | PR | ${{ after.se_hot_chocolate_pr.outputs.lexical }} | ${{ after.se_hot_chocolate_pr.outputs.structural }} | ${{ after.se_hot_chocolate_pr.outputs.syntax_ok }} | ${{ after.se_hot_chocolate_pr.outputs.bundle_ok }} | ${{ after.se_hot_chocolate_pr.outputs.failing }} |
        | wiki_reader | main | ${{ after.se_wiki_reader_main.outputs.lexical }} | ${{ after.se_wiki_reader_main.outputs.structural }} | ${{ after.se_wiki_reader_main.outputs.syntax_ok }} | ${{ after.se_wiki_reader_main.outputs.bundle_ok }} | — |
        | wiki_reader | PR | ${{ after.se_wiki_reader_pr.outputs.lexical }} | ${{ after.se_wiki_reader_pr.outputs.structural }} | ${{ after.se_wiki_reader_pr.outputs.syntax_ok }} | ${{ after.se_wiki_reader_pr.outputs.bundle_ok }} | ${{ after.se_wiki_reader_pr.outputs.failing }} |

        📎 [Reports](${{ workflow.url }})
