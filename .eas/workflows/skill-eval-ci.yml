# Non-interactive skill eval for PRs touching plugins/expo/skills/**.
# Advisory only -- posts a PR comment, never blocks merge.
#
# Runs the eval-experiments harness (private, vendored as the eval-harness
# submodule) against all 3 reference PRDs (notes, hot_chocolate,
# wiki_reader). Each PRD is authored twice -- once against main's current
# skill content, once against this PR's own -- so the comment shows
# before/after trigger recall/precision, plus code-quality signals
# (lexical/structural uptake checks, syntax/bundle build health).
#
# Baseline caching: each "_main" job computes a fingerprint (see
# scripts/calculate-eval-fingerprint.py and
# BASELINE_RESULT_CACHE_AND_PROMOTION.md, tracked separately) and tries an
# exact-match eas/restore_cache before authoring. On a hit, authoring and
# re-analysis are skipped and the cached metrics.json is reused. Only
# skill-eval-main-baseline.yml (trusted, push-to-main) ever writes that
# cache -- this file only ever reads it.
#
# Most of the actual logic lives in scripts/*.sh and scripts/*.py, not
# inline here: EAS Workflows has no shared-workflow-config or matrix
# support (each PRD's jobs must be declared separately), and this file
# previously tripped EAS's workflow-file-size limit from 12 near-identical
# job bodies duplicating that logic inline.
#
# Prerequisites: EVAL_HARNESS_ACCESS_TOKEN (read-only PAT for the private
# eval-harness repo), EXPO_TOKEN (optional, for MCP + eas build
# self-verification), ANTHROPIC_API_KEY (already present).
name: skill-eval-ci

on:
  pull_request:
    branches:
      - main
    paths:
      - plugins/expo/skills/**
  workflow_dispatch: {}

jobs:
  author_app_notes_main:
    name: author (notes, main)
    runs_on: linux-medium
    environment: production
    env:
      AGENT: claude-code
      PRD: dataset/prds/notes/prd/mvp.txt
      PRD_ID: notes
      SCENARIO: skills_available_unmentioned
    outputs:
      cache_hit: ${{ steps.check_cache.outputs.cache_hit }}
      fingerprint: ${{ steps.fingerprint.outputs.fingerprint }}
    steps:
      - uses: eas/checkout

      - name: compute main fingerprint
        id: fingerprint
        run: |
          bash scripts/fingerprint-main-content.sh extract > fingerprint-notes-main.json
          set-output fingerprint "$(python3 -c "import json; print(json.load(open('fingerprint-notes-main.json'))['fingerprint'])")"

      - name: restore cached main baseline
        uses: eas/restore_cache
        with:
          key: skill-eval-baseline-v1-${{ steps.fingerprint.outputs.fingerprint }}
          path: cached-baseline-notes-main

      - name: check cache hit
        id: check_cache
        run: set-output cache_hit "$(bash scripts/check-cache-hit.sh cached-baseline-notes-main "${{ steps.fingerprint.outputs.fingerprint }}")"

      - name: author app and package if needed
        id: package
        run: set-output packaged "$(bash scripts/author-and-package.sh "${{ steps.check_cache.outputs.cache_hit }}" /tmp/plugins-main/plugins/expo authored-app-notes-main.tar.gz)"

      - name: Upload authored app
        if: ${{ steps.package.outputs.packaged == 'true' }}
        uses: eas/upload_artifact
        with:
          type: other
          name: authored-app-notes-main
          path: authored-app-notes-main.tar.gz

  author_app_notes_pr:
    name: author (notes, PR)
    runs_on: linux-medium
    environment: production
    env:
      AGENT: claude-code
      PRD: dataset/prds/notes/prd/mvp.txt
      SCENARIO: skills_available_unmentioned
    steps:
      - uses: eas/checkout

      - name: fetch eval-harness
        run: bash scripts/fetch-eval-harness.sh

      - name: author app and package
        id: package
        run: set-output packaged "$(bash scripts/author-and-package.sh false "$(pwd)/plugins/expo" authored-app-notes-pr.tar.gz)"

      - name: Upload authored app
        if: ${{ steps.package.outputs.packaged == 'true' }}
        uses: eas/upload_artifact
        with:
          type: other
          name: authored-app-notes-pr
          path: authored-app-notes-pr.tar.gz

