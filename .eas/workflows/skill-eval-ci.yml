          lexical=$(python3 -c "import json; d=json.load(open('skill-eval-report-notes-pr/metrics.json')); c=d.get('check_category_breakdown', {}).get('lexical', {}); print(str(c.get('passed','?')) + '/' + str(c.get('total','?')))" 2>/dev/null || echo "?")
          structural=$(python3 -c "import json; d=json.load(open('skill-eval-report-notes-pr/metrics.json')); c=d.get('check_category_breakdown', {}).get('structural', {}); print(str(c.get('passed','?')) + '/' + str(c.get('total','?')))" 2>/dev/null || echo "?")
          syntax_ok=$(python3 -c "import json; d=json.load(open('skill-eval-report-notes-pr/metrics.json')); s=d.get('build_health', {}).get('syntax'); ok=(s or {}).get('ok'); print('➖' if s is None else ('❔' if ok is None else ('✅' if ok else '❌')))" 2>/dev/null || echo "?")
          bundle_ok=$(python3 -c "import json; d=json.load(open('skill-eval-report-notes-pr/metrics.json')); b=d.get('build_health', {}).get('bundle'); ok=(b or {}).get('ok'); print('➖' if b is None else ('❔' if ok is None else ('✅' if ok else '❌')))" 2>/dev/null || echo "?")
          set-output report "${summary:-no report}"
          set-output expected "${expected:-?}"
          set-output detected "${detected:-?}"
          set-output recall "${recall:-?}"
          set-output precision "${precision:-?}"
          set-output lexical "${lexical:-?}"
          set-output structural "${structural:-?}"
          set-output syntax_ok "${syntax_ok:-?}"
          set-output bundle_ok "${bundle_ok:-?}"

      - name: Package skill-eval report
        if: ${{ always() }}
