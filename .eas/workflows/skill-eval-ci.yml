      - name: Upload skill-eval report
        if: ${{ always() }}
        uses: eas/upload_artifact
        with:
          type: other
          name: skill-eval-report-hot_chocolate-main
          path: skill-eval-report-hot_chocolate-main.tar.gz

  eval_skill_hot_chocolate_pr:
    name: skill eval (hot_chocolate, PR)
    needs: [author_app_hot_chocolate_pr]
    runs_on: linux-medium
    environment: production
    outputs:
