          type: other
          name: authored-app-wiki_reader-main
          path: authored-app-wiki_reader-main.tar.gz

  author_app_wiki_reader_pr:
    name: author (wiki_reader, PR)
    runs_on: linux-medium
    environment: production
    env:
      AGENT: claude-code
      PRD: dataset/prds/wiki_reader/prd/mvp.txt
      SCENARIO: skills_available_unmentioned
    steps:
      - uses: eas/checkout

      - name: fetch eval-harness
        run: |
          git config --global url."https://x-access-token:${EVAL_HARNESS_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init eval-harness

      - name: author app (Claude Code, this PR's own skill checkout)
        run: |
          export SKILL_PLUGIN_DIR="$(pwd)/plugins/expo"
          bash ./eval-harness/eval_harness/app_builder/scripts/author-app.sh

      - name: Package authored app
        if: ${{ always() }}
        run: |
          tar \
            --exclude 'eval-harness/agent-workspace/*/node_modules' \
            --exclude 'eval-harness/agent-workspace/*/.expo' \
            --exclude 'eval-harness/agent-workspace/*/.mcp.json' \
            -czf authored-app-wiki_reader-pr.tar.gz -C eval-harness agent-workspace eval-out

      - name: Upload authored app
        if: ${{ always() }}
        uses: eas/upload_artifact
        with:
          type: other
          name: authored-app-wiki_reader-pr
          path: authored-app-wiki_reader-pr.tar.gz

  # --- Skill-eval analysis, once per author job above -----------------------
  # Each job exposes 5 outputs (report, expected, detected, recall, precision)
  # instead of just `report`: the final `comment` job is a `type:
  # github-comment` job whose payload is template-only (no shell step to parse
  # a composite string), so a clean side-by-side table with a single shared
  # "Expected skills" column requires the fields to already be split at the
  # source. `report` is kept too, for parity with the pre-comparison format
  # and for quick debugging from the job output list.

  eval_skill_notes_main:
    name: skill eval (notes, main)
    needs: [author_app_notes_main]
    runs_on: linux-medium
    environment: production
    outputs:
      report: ${{ steps.run.outputs.report }}
      expected: ${{ steps.run.outputs.expected }}
      detected: ${{ steps.run.outputs.detected }}
      recall: ${{ steps.run.outputs.recall }}
      precision: ${{ steps.run.outputs.precision }}
      lexical: ${{ steps.run.outputs.lexical }}
      structural: ${{ steps.run.outputs.structural }}
      syntax_ok: ${{ steps.run.outputs.syntax_ok }}
      bundle_ok: ${{ steps.run.outputs.bundle_ok }}
    steps:
      - uses: eas/checkout

      - name: fetch eval-harness
        run: |
          git config --global url."https://x-access-token:${EVAL_HARNESS_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init eval-harness

      - name: Download authored app
        uses: eas/download_artifact
        id: download_author
        with:
          name: authored-app-notes-main

      - name: Analyze authored app for skill eval
        id: run
        run: |
          AUTHORED_ARTIFACT='${{ steps.download_author.outputs.artifact_path }}' \
          SCENARIO='skills_available_unmentioned' \
          OUT_DIR=skill-eval-report-notes-main \
          PRD_SKILLS="$(pwd)/eval-harness/dataset/prd_skills.json" \
          CASE_DIR="$(pwd)/eval-harness/eval_harness/evaluator/skill_invocation/skill_cases" \
          bash ./eval-harness/eval_harness/evaluator/skill_invocation/scripts/eval-skill-use.sh
          summary=$(python3 -c "import json; d=json.load(open('skill-eval-report-notes-main/metrics.json')); r=(d.get('runs') or [{}])[0]; print('expected=' + str(r.get('skill_id')) + ' detected=' + (','.join(r.get('detected_skills') or []) or 'none') + ' recall=' + str(r.get('trigger_recall')) + ' precision=' + str(r.get('trigger_precision')))" 2>/dev/null || echo "no summary")
          expected=$(python3 -c "import json; d=json.load(open('skill-eval-report-notes-main/metrics.json')); r=(d.get('runs') or [{}])[0]; print(str(r.get('skill_id')))" 2>/dev/null || echo "?")
          detected=$(python3 -c "import json; d=json.load(open('skill-eval-report-notes-main/metrics.json')); r=(d.get('runs') or [{}])[0]; print((','.join(r.get('detected_skills') or []) or 'none'))" 2>/dev/null || echo "?")
          recall=$(python3 -c "import json; d=json.load(open('skill-eval-report-notes-main/metrics.json')); r=(d.get('runs') or [{}])[0]; print(str(r.get('trigger_recall')))" 2>/dev/null || echo "?")
          precision=$(python3 -c "import json; d=json.load(open('skill-eval-report-notes-main/metrics.json')); r=(d.get('runs') or [{}])[0]; print(str(r.get('trigger_precision')))" 2>/dev/null || echo "?")
          lexical=$(python3 -c "import json; d=json.load(open('skill-eval-report-notes-main/metrics.json')); c=d.get('check_category_breakdown', {}).get('lexical', {}); print(str(c.get('passed','?')) + '/' + str(c.get('total','?')))" 2>/dev/null || echo "?")
          structural=$(python3 -c "import json; d=json.load(open('skill-eval-report-notes-main/metrics.json')); c=d.get('check_category_breakdown', {}).get('structural', {}); print(str(c.get('passed','?')) + '/' + str(c.get('total','?')))" 2>/dev/null || echo "?")
          syntax_ok=$(python3 -c "import json; d=json.load(open('skill-eval-report-notes-main/metrics.json')); s=d.get('build_health', {}).get('syntax'); ok=(s or {}).get('ok'); print('➖' if s is None else ('❔' if ok is None else ('✅' if ok else '❌')))" 2>/dev/null || echo "?")
          bundle_ok=$(python3 -c "import json; d=json.load(open('skill-eval-report-notes-main/metrics.json')); b=d.get('build_health', {}).get('bundle'); ok=(b or {}).get('ok'); print('➖' if b is None else ('❔' if ok is None else ('✅' if ok else '❌')))" 2>/dev/null || echo "?")
          set-output report "${summary:-no report}"
          set-output expected "${expected:-?}"
          set-output detected "${detected:-?}"
          set-output recall "${recall:-?}"
          set-output precision "${precision:-?}"
          set-output lexical "${lexical:-?}"
          set-output structural "${structural:-?}"
          set-output syntax_ok "${syntax_ok:-?}"
          set-output bundle_ok "${bundle_ok:-?}"

      - name: Package skill-eval report
        if: ${{ always() }}
        run: tar -czf skill-eval-report-notes-main.tar.gz skill-eval-report-notes-main

      - name: Upload skill-eval report
        if: ${{ always() }}
        uses: eas/upload_artifact
        with:
          type: other
          name: skill-eval-report-notes-main
          path: skill-eval-report-notes-main.tar.gz

  eval_skill_notes_pr:
    name: skill eval (notes, PR)
