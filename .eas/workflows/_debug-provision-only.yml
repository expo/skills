name: debug-provision-only

on:
  workflow_dispatch: {}

jobs:
  provision_mcp_token:
    name: provision Expo MCP token
    runs_on: linux-medium
    environment: production
    outputs:
      bearer_token: ${{ steps.provision.outputs.bearer_token }}
      auth_status: ${{ steps.provision.outputs.auth_status }}
    steps:
      - uses: eas/checkout

      - name: fetch eval-harness
        run: |
          git config --global url."https://x-access-token:${EVAL_HARNESS_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init eval-harness

      - name: refresh Expo MCP OAuth token
        id: provision
        run: |
          out=$(bash ./eval-harness/eval_harness/utils/shell/provision-mcp-token.sh)
          bearer_token=$(echo "$out" | sed -n 's/^bearer_token=//p')
          auth_status=$(echo "$out" | sed -n 's/^auth_status=//p')
          echo "auth_status=$auth_status (bearer_token len ${#bearer_token})"
          set-output bearer_token "${bearer_token:-none}"
          set-output auth_status "${auth_status:-unconfigured}"
