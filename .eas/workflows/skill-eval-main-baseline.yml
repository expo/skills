      - name: check cache hit
        id: check_cache
        run: set-output cache_hit "$(bash scripts/check-cache-hit.sh cached-baseline-hot_chocolate-main "${{ steps.fingerprint.outputs.fingerprint }}")"

      - name: author and evaluate if needed
        if: ${{ steps.check_cache.outputs.cache_hit == 'false' }}
        run: bash scripts/author-and-evaluate-baseline.sh "$(pwd)/plugins/expo" cached-baseline-hot_chocolate-main skills_available_unmentioned

      - name: write baseline manifest
        id: manifest
        if: ${{ steps.check_cache.outputs.cache_hit == 'false' }}
        run: |
          python3 scripts/validate-result-bundle.py write \
            --bundle-dir cached-baseline-hot_chocolate-main \
            --fingerprint-json fingerprint-hot_chocolate-main.json \
            --status success --kind baseline \
            --source-repo "${{ github.repository }}" \
            --source-commit "${{ github.sha }}" \
            --workflow-run-id "${{ workflow.id }}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            set-output should_save true
          else
            set-output should_save false
          fi

      - name: save main baseline to cache
        if: ${{ steps.manifest.outputs.should_save == 'true' }}
        uses: eas/save_cache
        with:
          key: skill-eval-baseline-v1-${{ steps.fingerprint.outputs.fingerprint }}
          path: cached-baseline-hot_chocolate-main

      - name: upload baseline artifact for audit
        if: ${{ steps.check_cache.outputs.cache_hit == 'false' }}
        uses: eas/upload_artifact
        with:
          type: other
