          path: cached-baseline-hot_chocolate-main

  baseline_wiki_reader:
    name: baseline (wiki_reader)
    runs_on: linux-medium
    environment: production
    env:
      AGENT: claude-code
      PRD: dataset/prds/wiki_reader/prd/mvp.txt
