      - name: author and evaluate if needed
        if: ${{ steps.check_cache.outputs.cache_hit == 'false' }}
        run: bash scripts/author-and-evaluate-baseline.sh "$(pwd)/plugins/expo" cached-baseline-wiki_reader-main skills_available_unmentioned

      - name: write baseline manifest
        id: manifest
        if: ${{ steps.check_cache.outputs.cache_hit == 'false' }}
        run: |
          python3 scripts/validate-result-bundle.py write \
            --bundle-dir cached-baseline-wiki_reader-main \
